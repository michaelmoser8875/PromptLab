<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PromptLab — 2D Mechanism Animations</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: #0c0f16; color: #e7ecf3;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      display: flex; flex-direction: column; min-height: 100vh;
    }
    header { padding: 18px 24px 8px; }
    h1 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: .2px; }
    .sub { color: #8b94a3; font-size: 13px; margin-top: 2px; }
    .bar {
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
      padding: 12px 24px; border-bottom: 1px solid #1c2230;
    }
    select, button {
      background: #161c28; color: #e7ecf3; border: 1px solid #2a3344;
      border-radius: 8px; padding: 8px 12px; font-size: 14px; cursor: pointer;
    }
    button:hover, select:hover { border-color: #3c4a63; }
    button.primary { background: #2f6dff; border-color: #2f6dff; font-weight: 600; }
    .stage { flex: 1; display: flex; flex-direction: column; padding: 8px 24px 0; }
    #equation {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 15px; color: #aeb8c8; margin: 4px 0 8px;
    }
    .canvas-wrap {
      flex: 1; min-height: 360px; background:
        radial-gradient(1200px 500px at 50% -10%, #141b2b 0%, #0c0f16 70%);
      border: 1px solid #1c2230; border-radius: 14px; overflow: hidden;
    }
    svg { width: 100%; height: 100%; display: block; }
    .scrub { display: flex; align-items: center; gap: 12px; padding: 12px 24px; }
    input[type=range] { flex: 1; accent-color: #2f6dff; }
    #caption {
      min-height: 44px; padding: 10px 24px 22px; color: #cdd6e4; font-size: 15px;
      max-width: 920px;
    }
    .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: #97a1b2; padding: 0 24px 8px; }
    .chip { display: inline-flex; align-items: center; gap: 6px; }
    .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
    .err { color: #ff7a7a; padding: 12px 24px; }
  </style>
</head>
<body>
  <header>
    <h1>PromptLab — 2D Mechanism Animations</h1>
    <div class="sub">Mechanism-templated animation from a balanced equation. Pick a reaction, then play.</div>
  </header>

  <div class="bar">
    <label for="spec">Reaction:</label>
    <select id="spec"></select>
    <button id="play" class="primary">▶ Play</button>
    <button id="restart">⟲ Restart</button>
    <label for="speed">Speed</label>
    <select id="speed">
      <option value="0.5">0.5×</option>
      <option value="1" selected>1×</option>
      <option value="1.5">1.5×</option>
      <option value="2">2×</option>
    </select>
  </div>

  <div class="stage">
    <div id="equation"></div>
    <div class="canvas-wrap"><svg id="canvas" preserveAspectRatio="xMidYMid meet"></svg></div>
  </div>

  <div class="scrub">
    <input id="scrub" type="range" min="0" max="1000" value="0" />
  </div>
  <div class="legend">
    <span class="chip"><span class="dot" style="background:#2fd0ff"></span>nucleophile / base</span>
    <span class="chip"><span class="dot" style="background:#ff9f43"></span>electrophile</span>
    <span class="chip"><span class="dot" style="background:#ff5e5e"></span>leaving group</span>
    <span class="chip"><span class="dot" style="background:#ffd633"></span>acidic proton</span>
    <span class="chip"><span class="dot" style="background:#3ce06a"></span>bond forming</span>
    <span class="chip"><span class="dot" style="background:#ff6363"></span>bond breaking</span>
  </div>
  <div id="caption"></div>
  <div id="error" class="err"></div>

  <script type="module">
    import { MechanismPlayer } from "./src/animations/2d/player.js";

    const svg = document.getElementById("canvas");
    const player = new MechanismPlayer(
      svg,
      document.getElementById("caption"),
      document.getElementById("equation"),
    );

    const specSel = document.getElementById("spec");
    const scrub = document.getElementById("scrub");
    const playBtn = document.getElementById("play");
    const errEl = document.getElementById("error");

    player.onProgress = (p) => { scrub.value = String(Math.round(p * 1000)); };
    player.onEnd = () => { playBtn.textContent = "⟲ Replay"; };

    async function loadSpec(file) {
      errEl.textContent = "";
      try {
        const spec = await (await fetch(`./specs/${file}`)).json();
        player.load(spec);
        scrub.value = "0";
        playBtn.textContent = "▶ Play";
      } catch (e) {
        errEl.textContent =
          "Could not load spec. Serve this folder over HTTP (e.g. `python -m http.server` in frontend/) rather than opening the file directly. " + e;
      }
    }

    playBtn.addEventListener("click", () => {
      player.toggle();
      playBtn.textContent = player.playing ? "❚❚ Pause" : "▶ Play";
    });
    document.getElementById("restart").addEventListener("click", () => {
      player.restart();
      playBtn.textContent = "❚❚ Pause";
    });
    document.getElementById("speed").addEventListener("change", (e) => {
      player.setSpeed(parseFloat(e.target.value));
    });
    scrub.addEventListener("input", (e) => {
      player.seek(parseInt(e.target.value, 10) / 1000);
      playBtn.textContent = "▶ Play";
    });
    specSel.addEventListener("change", () => loadSpec(specSel.value));

    (async function init() {
      try {
        const params = new URLSearchParams(location.search);
        const index = await (await fetch("./specs/index.json")).json();
        for (const s of index.specs) {
          const opt = document.createElement("option");
          opt.value = s.file;
          opt.textContent = `${s.type} — ${s.label}`;
          specSel.appendChild(opt);
        }
        const wanted = params.get("spec");
        const initial =
          (wanted && index.specs.find((s) => s.file === wanted)?.file) ||
          index.specs[0]?.file;
        if (initial) {
          specSel.value = initial;
          await loadSpec(initial);
          // Deep-link to a frozen frame (?t=0..1) or auto-play (?play).
          const t = parseFloat(params.get("t"));
          if (!Number.isNaN(t)) {
            player.seek(t);
            scrub.value = String(Math.round(t * 1000));
          } else if (params.has("play")) {
            player.play();
            playBtn.textContent = "❚❚ Pause";
          }
        }
      } catch (e) {
        errEl.textContent =
          "Could not load spec index. Serve this folder over HTTP: `cd frontend && python -m http.server`, then open the printed URL. " + e;
      }
    })();
  </script>
</body>
</html>
